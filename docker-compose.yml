# Standalone deployment for the privacy-indexer.
#
#   cp .env.example .env   # then edit RPC URL, chain id, CORS origins, …
#   docker compose up -d --build
#
# Persistence (production-grade): PostgreSQL stores scan checkpoints, commitment
# tree leaves and encrypted notes (migrations run automatically at startup).
# The small pools registry (runtime POST /pools registrations) stays on the
# /data volume; pool auto-discovery self-heals it anyway.
#
# Pools can be left empty here and registered at runtime via POST /pools
# (the issuance frontend does this automatically when an asset is created).
services:
  indexer:
    build: .
    image: privacy-indexer:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Bind on all interfaces inside the container; the host mapping below is
      # loopback-only by default so production traffic must enter via a reverse
      # proxy that exposes read paths and protects write/admin paths.
      PRIVACYBTC_INDEXER_BIND: 0.0.0.0:8787
      # PostgreSQL state backend (checkpoints + leaves + notes).
      PRIVACYBTC_INDEXER_DATABASE_URL: postgres://privacybtc:${POSTGRES_PASSWORD:-privacybtc}@postgres:5432/privacybtc
      # Runtime-registered pools list (small JSON; survives restarts on the volume).
      PRIVACYBTC_INDEXER_POOLS_REGISTRY: /data/pools.json
    ports:
      - "${INDEXER_HOST_BIND:-127.0.0.1}:${INDEXER_HOST_PORT:-8787}:8787"
    volumes:
      - indexer-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: privacybtc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privacybtc}
      POSTGRES_DB: privacybtc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privacybtc -d privacybtc"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  indexer-data:
  postgres-data:
